<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subash Photography</title>
<link rel="icon" type="image/png" href="subashimg.png">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.hero img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;

  border: 3px solid transparent;
  background: linear-gradient(#000,#000) padding-box,
              linear-gradient(45deg,#ffcc00,#ff6600) border-box;
}

.hero h1 {
  margin-top: 15px;
  font-size: 26px;
  background: linear-gradient(45deg,#ffcc00,#ffaa00);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  opacity: 0.6;
  font-size: 14px;
}

/* GLASS FORM */
.form-box {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255,255,255,0.05);
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* RATINGS */
.rating {
  margin-top: 15px;
}

.rating p {
  font-size: 14px;
  opacity: 0.8;
}

.stars {
  display: flex;
  gap: 6px;
  font-size: 26px;
}

.star {
  color: #444;
  cursor: pointer;
  transition: 0.2s;
}

.star.active {
  color: gold;
  transform: scale(1.2);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg,#ffcc00,#ffaa00);
  font-weight: bold;
}

/* POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* CARD */
#card {
  width: 90vw;
  max-width: 360px;
  aspect-ratio: 1;
  border-radius: 25px;
  padding: 30px;

  background: linear-gradient(135deg,#111,#1c1c1c);
  box-shadow: 0 0 60px rgba(255,200,0,0.25);

  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

#finalStars { font-size: 34px; }

#reviewText {
  margin: 18px 0;
  font-size: 18px;
  line-height: 1.5;
}

#userName {
  font-weight: bold;
}

.brand {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}

.popup-buttons {
  width: 90%;
  max-width: 360px;
  margin-top: 20px;
}

.popup-buttons button {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="subashimg.png">
  <h1>@subash.photography._</h1>
  <p>Photography • Videography • Editing • Designing</p>
</div>

<!-- FORM -->
<div class="form-box">

  <input type="text" id="name" placeholder="Your Name">

  <div class="rating" data-type="photo"><p>Photography</p><div class="stars"></div></div>
  <div class="rating" data-type="video"><p>Videography</p><div class="stars"></div></div>
  <div class="rating" data-type="edit"><p>Edits</p><div class="stars"></div></div>
  <div class="rating" data-type="poster"><p>Poster</p><div class="stars"></div></div>
  <div class="rating" data-type="engagement"><p>Engagement & Quality</p><div class="stars"></div></div>
  

  <textarea id="remarks" placeholder="What did you like most?"></textarea>

  <button onclick="submitReview()">Submit</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="card">
    <div id="finalStars"></div>
    <div id="reviewText"></div>
    <div id="userName"></div>
    <div class="brand">@subash.photography._</div>
  </div>

  <div class="popup-buttons">
    <button onclick="shareCard()">Share</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
let ratings = {photo:0, video:0, edit:0, engagement:0, poster:0};

document.querySelectorAll(".rating").forEach(section=>{
  const type = section.dataset.type;
  const container = section.querySelector(".stars");

  for(let i=1;i<=5;i++){
    const star=document.createElement("span");
    star.innerHTML="★";
    star.classList.add("star");

    star.onclick=()=>{
      ratings[type]=i;
      container.querySelectorAll(".star").forEach((s,index)=>{
        s.classList.toggle("active",index<i);
      });
    };

    container.appendChild(star);
  }
});

function submitReview(){
  const name=document.getElementById("name").value.trim();
  const remarks=document.getElementById("remarks").value.trim();

  if(!name||!remarks){ alert("Fill all fields"); return; }

  const values=Object.values(ratings);
  if(values.includes(0)){ alert("Rate all categories"); return; }

  const avg=values.reduce((a,b)=>a+b)/values.length;
  const final=Math.round(avg);

  document.getElementById("finalStars").innerText="⭐".repeat(final);
  document.getElementById("reviewText").innerText=`"${remarks}"`;
  document.getElementById("userName").innerText="- "+name;

  document.getElementById("popup").style.display="flex";
}

async function shareCard(){
  const canvas=await html2canvas(document.getElementById("card"));
  canvas.toBlob(async blob=>{
    const file=new File([blob],"review.png",{type:"image/png"});
    if(navigator.share && navigator.canShare({files:[file]})){
      await navigator.share({files:[file]});
    } else {
      let link=document.createElement("a");
      link.download="review.png";
      link.href=canvas.toDataURL();
      link.click();
    }
  });
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
